<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>球震 - 比赛预测</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;
  --bg2:#020617;
  --card:#1e293b;
  --card2:#263248;
  --border:#2d3f5a;
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#64748b;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,.1);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,.1);
  --yellow:#f59e0b;
  --yellow-bg:rgba(245,158,11,.1);
  --blue:#3b82f6;
  --blue-bg:rgba(59,130,246,.1);
  --purple:#a78bfa;
  --purple-bg:rgba(167,139,250,.1);
}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;min-height:100vh}

/* ── Header ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.logo-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:1px}
.live-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--red);font-weight:600}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.2s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── Sport Tabs ── */
.sport-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;padding:0 16px}
.stab{padding:10px 16px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.stab.on{color:#fff;border-bottom-color:#6366f1;font-weight:600}
.stab:hover{color:var(--text)}

/* ── Filter Bar ── */
.filter-bar{padding:12px 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fb{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);
  color:var(--text2);background:transparent;transition:all .15s;white-space:nowrap;user-select:none;flex-shrink:0}
.fb:hover{border-color:#6366f1;color:#fff}
.fb.on{background:#6366f1;color:#fff;border-color:#6366f1;font-weight:600}

/* ── Cards ── */
.container{padding:0 12px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#6366f180}
.card-top{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.league-tag{display:flex;align-items:center;gap:6px}
.league-dot{width:3px;height:12px;background:#6366f1;border-radius:2px}
.league-name{font-size:11px;font-weight:600;color:#a78bfa}
.league-round{font-size:11px;color:var(--text3);margin-left:2px}
.match-time{font-size:11px;color:var(--text3)}
.match-time.live{color:var(--red);font-weight:600}

.card-body{padding:14px}
.teams-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:12px}
.team{display:flex;flex-direction:column;align-items:center;gap:6px}
.team-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:1.5px solid var(--border)}
.team-name{font-size:13px;font-weight:600;color:var(--text);text-align:center;line-height:1.3}
.team-form{display:flex;gap:2px}
.form-dot{width:14px;height:14px;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700}
.fw{background:rgba(34,197,94,.2);color:#22c55e}
.fd{background:rgba(245,158,11,.2);color:#f59e0b}
.fl{background:rgba(239,68,68,.2);color:#ef4444}

.score-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.score{font-size:26px;font-weight:700;color:#6366f1;letter-spacing:6px;line-height:1}
.vs{font-size:13px;font-weight:600;color:var(--text3)}
.time-badge{font-size:12px;color:var(--text2);font-weight:600}
.live-badge{display:flex;align-items:center;gap:4px;background:var(--red-bg);color:var(--red);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}

/* ── AI Prediction Block ── */
.pred-block{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:10px}
.pred-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;margin-bottom:8px}
.pred-bars{display:flex;flex-direction:column;gap:6px}
.pred-bar-row{display:flex;align-items:center;gap:8px}
.pred-bar-label{font-size:11px;color:var(--text2);min-width:28px;font-weight:500}
.pred-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pred-bar-fill{height:100%;border-radius:3px}
.fill-w{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.fill-d{background:linear-gradient(90deg,#f59e0b,#f97316)}
.fill-l{background:linear-gradient(90deg,#ef4444,#f43f5e)}
.pred-bar-pct{font-size:11px;font-weight:700;min-width:30px;text-align:right}
.pct-w{color:#a78bfa}.pct-d{color:#f59e0b}.pct-l{color:#ef4444}

.confidence-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.conf-label{font-size:11px;color:var(--text3)}
.conf-val{font-size:13px;font-weight:700}
.conf-high{color:var(--green)}.conf-mid{color:var(--yellow)}.conf-low{color:var(--red)}
.conf-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 10px;overflow:hidden}
.conf-bar{height:100%;border-radius:2px}
.conf-bar.high{background:var(--green)}.conf-bar.mid{background:var(--yellow)}.conf-bar.low{background:var(--red)}

/* ── Card Footer ── */
.card-foot{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s}
.tag-live{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,.3)}
.tag-default{background:var(--card2);color:var(--text2);border-color:var(--border)}
.tag-default:hover{border-color:#6366f180;color:#fff}
.tag-pred{background:var(--green-bg);color:var(--green);border-color:rgba(34,197,94,.3)}

.open-pred-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;font-weight:600;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.open-pred-btn:hover{border-color:#6366f1;color:#fff;background:rgba(99,102,241,.08)}
.pred-count{color:var(--purple);font-size:11px}

/* ── State ── */
.state-box{text-align:center;padding:60px 20px;color:var(--text3)}
.state-icon{font-size:40px;margin-bottom:14px}
.state-text{font-size:14px;line-height:1.8}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:#6366f1;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ── */
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center}
.modal-bd.open{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:20px;max-height:85vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.modal-match-sub{font-size:12px;color:#a78bfa;margin-bottom:14px}
.modal-vote-row{display:flex;gap:8px;margin-bottom:12px}
.mvote{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;font-size:12px;
  cursor:pointer;text-align:center;color:var(--text2);background:var(--bg2);transition:all .15s;font-weight:600;user-select:none}
.mvote:hover{border-color:#6366f1;color:#fff}
.mvote.on{background:#6366f1;color:#fff;border-color:#6366f1}
.modal-input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:#fff;background:var(--bg2);outline:none;font-family:inherit;margin-bottom:10px}
.modal-input:focus{border-color:#6366f1}
.modal-input::placeholder{color:var(--text3)}
.modal-textarea{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;color:#fff;background:var(--bg2);outline:none;resize:none;min-height:80px;
  font-family:inherit;line-height:1.6;margin-bottom:10px}
.modal-textarea:focus{border-color:#6366f1}
.modal-textarea::placeholder{color:var(--text3)}
.modal-footer-row{display:flex;align-items:center;justify-content:space-between}
.char-count{font-size:11px;color:var(--text3)}
.modal-submit{padding:10px 24px;background:#6366f1;color:#fff;border:none;border-radius:8px;
  font-size:13px;cursor:pointer;font-weight:600;transition:background .15s}
.modal-submit:hover{background:#4f46e5}
.modal-submit:disabled{opacity:.5;cursor:not-allowed}
.modal-toast{display:none;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);
  color:var(--green);font-size:12px;padding:8px 14px;border-radius:8px;text-align:center;margin-top:10px;font-weight:600}

.pred-list-wrap{margin-bottom:14px}
.pred-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.pred-item:last-child{border-bottom:none}
.pred-av{width:28px;height:28px;border-radius:50%;background:var(--purple-bg);border:1px solid rgba(167,139,250,.3);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--purple);flex-shrink:0}
.pred-right{flex:1;min-width:0}
.pred-author-row{font-size:12px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.pred-vtag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.vtag-w{background:var(--purple-bg);color:var(--purple)}
.vtag-d{background:var(--yellow-bg);color:var(--yellow)}
.vtag-l{background:var(--blue-bg);color:var(--blue)}
.pred-content{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:5px}
.pred-meta-row{display:flex;align-items:center;gap:10px}
.pred-time{font-size:10px;color:var(--text3)}
.like-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);
  cursor:pointer;padding:2px 7px;border-radius:4px;border:1px solid var(--border);
  background:transparent;transition:all .15s;user-select:none}
.like-btn:hover{border-color:#6366f180;color:#fff}
.like-btn.liked{border-color:rgba(167,139,250,.4);color:var(--purple);background:var(--purple-bg)}
.pred-empty{font-size:12px;color:var(--text3);padding:4px 0 12px}
.pred-loading{font-size:12px;color:var(--text3);padding:8px 0 12px;text-align:center}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;cursor:pointer;color:var(--text3);transition:all .15s}
.bnav-item.on{color:#6366f1}
.bnav-item svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bnav-label{font-size:10px;font-weight:600}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div>
        <div class="logo-name">球震</div>
        <div class="logo-sub">QIUZHEN</div>
      </div>
    </div>
    <div class="live-dot"><div class="dot"></div>直播中</div>
  </div>
</div>

<!-- Sport Tabs -->
<div class="sport-tabs">
  <div class="stab on">⚽ 足球</div>
  <div class="stab">🏀 篮球</div>
</div>

<!-- Filter -->
<div class="filter-bar">
  <div class="fb on" onclick="filterLeague(this,'all')">全部</div>
  <div class="fb" onclick="filterLeague(this,'英超')">英超</div>
  <div class="fb" onclick="filterLeague(this,'意甲')">意甲</div>
  <div class="fb" onclick="filterLeague(this,'德甲')">德甲</div>
  <div class="fb" onclick="filterLeague(this,'西甲')">西甲</div>
  <div class="fb" onclick="filterLeague(this,'法甲')">法甲</div>
  <div class="fb" onclick="filterLeague(this,'中超')">中超</div>
</div>

<!-- Match List -->
<div class="container">
  <div id="matchList">
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-text">加载比赛数据...</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="bnav-item on">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <span class="bnav-label">比赛</span>
  </div>
  <div class="bnav-item">
    <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
    <span class="bnav-label">赔率</span>
  </div>
  <div class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
    <span class="bnav-label">AI预测</span>
  </div>
  <div class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span class="bnav-label">球吧</span>
  </div>
  <div class="bnav-item">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="bnav-label">我的</span>
  </div>
</div>

<!-- 球迷观点弹窗 -->
<div class="modal-bd" id="modal-bd" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">球迷观点</div>
    <div class="modal-match-sub" id="modal-match-name">—</div>
    <div class="pred-list-wrap" id="modal-pred-list"></div>
    <div class="modal-vote-row">
      <div class="mvote" onclick="selectVote(this,'主胜')">🏠 主胜</div>
      <div class="mvote" onclick="selectVote(this,'平局')">🤝 平局</div>
      <div class="mvote" onclick="selectVote(this,'客胜')">✈️ 客胜</div>
    </div>
    <input class="modal-input" id="modal-username" placeholder="你的昵称（留空为匿名）" maxlength="20">
    <textarea class="modal-textarea" id="modal-content" placeholder="分享你的看法、分析思路..." maxlength="200"></textarea>
    <div class="modal-footer-row">
      <span class="char-count" id="char-count">0 / 200</span>
      <button class="modal-submit" id="modal-submit" onclick="submitPred()">发布</button>
    </div>
    <div class="modal-toast" id="modal-toast">✓ 发布成功！</div>
  </div>
</div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, addDoc, doc,
         updateDoc, increment, query, orderBy, where,
         limit, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

/* ── Firebase 配置 ── */
const firebaseConfig = {
  apiKey:            "AIzaSyBjkd93pW2Kuv5mUFKdTSSZx3wH130cHrk",
  authDomain:        "qiuzhen.firebaseapp.com",
  projectId:         "qiuzhen",
  storageBucket:     "qiuzhen.firebasestorage.app",
  messagingSenderId: "347369779829",
  appId:             "1:347369779829:web:8aff1183be87895b1cfe3c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ── 工具函数 ── */
const ini = n => n && n.length > 2 ? n.slice(0,2) : (n||'?');
const fm  = {W:'fw', D:'fd', L:'fl'};

function fmtTime(ts){
  if(!ts) return '';
  const d    = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Math.floor((Date.now() - d) / 1000);
  if(diff < 60)    return `${diff}秒前`;
  if(diff < 3600)  return `${Math.floor(diff/60)}分钟前`;
  if(diff < 86400) return `${Math.floor(diff/3600)}小时前`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

/* ── 渲染比赛卡片 ── */
function renderCard(id, d){
  const live     = d.status === '直播中';
  const hf       = (d.hf||[]).map(f=>`<div class="form-dot ${fm[f]||''}">${f}</div>`).join('');
  const af       = (d.af||[]).map(f=>`<div class="form-dot ${fm[f]||''}">${f}</div>`).join('');
  const win      = parseInt(d.winPct)  || 40;
  const draw     = parseInt(d.drawPct) || 28;
  const lose     = 100 - win - draw;
  const conf     = parseInt(d.confidence) || 0;
  const confCls  = conf >= 70 ? 'high' : conf >= 50 ? 'mid' : 'low';
  const safeHome = (d.home||'主队').replace(/'/g, '');
  const safeAway = (d.away||'客队').replace(/'/g, '');

  return `
  <div class="card" id="card-${id}">
    <div class="card-top">
      <div class="league-tag">
        <div class="league-dot"></div>
        <span class="league-name">${d.league||'—'}</span>
        <span class="league-round">${d.round||''}</span>
      </div>
      <span class="match-time${live?' live':''}">${live?'⏱ 直播中':d.time||''}</span>
    </div>
    <div class="card-body">
      <div class="teams-row">
        <div class="team">
          <div class="team-av" style="background:${d.hc||'#6366f1'}18;border-color:${d.hc||'#6366f1'}44;color:${d.hc||'#6366f1'}">${ini(d.home)}</div>
          <div class="team-name">${d.home||'主队'}</div>
          <div class="team-form">${hf}</div>
        </div>
        <div class="score-box">
          ${live
            ? `<div class="score">${d.score||'0-0'}</div>
               <div class="live-badge"><div class="dot"></div>${d.minute||''}分</div>`
            : `<div class="vs">VS</div>
               <div class="time-badge">${d.time||''}</div>`}
        </div>
        <div class="team">
          <div class="team-av" style="background:${d.ac||'#3b82f6'}18;border-color:${d.ac||'#3b82f6'}44;color:${d.ac||'#3b82f6'}">${ini(d.away)}</div>
          <div class="team-name">${d.away||'客队'}</div>
          <div class="team-form">${af}</div>
        </div>
      </div>

      ${d.prediction ? `
      <div class="pred-block">
        <div class="pred-label">AI 胜平负概率</div>
        <div class="pred-bars">
          <div class="pred-bar-row">
            <span class="pred-bar-label">主胜</span>
            <div class="pred-bar-track"><div class="pred-bar-fill fill-w" style="width:${win}%"></div></div>
            <span class="pred-bar-pct pct-w">${win}%</span>
          </div>
          <div class="pred-bar-row">
            <span class="pred-bar-label">平局</span>
            <div class="pred-bar-track"><div class="pred-bar-fill fill-d" style="width:${draw}%"></div></div>
            <span class="pred-bar-pct pct-d">${draw}%</span>
          </div>
          <div class="pred-bar-row">
            <span class="pred-bar-label">客胜</span>
            <div class="pred-bar-track"><div class="pred-bar-fill fill-l" style="width:${lose}%"></div></div>
            <span class="pred-bar-pct pct-l">${lose}%</span>
          </div>
        </div>
      </div>
      <div class="confidence-row">
        <span class="conf-label">AI 信心指数</span>
        <div class="conf-bar-wrap"><div class="conf-bar ${confCls}" style="width:${conf}%"></div></div>
        <span class="conf-val conf-${confCls}">${conf}%</span>
      </div>` : ''}

      <div class="card-foot">
        ${live ? '<span class="tag tag-live">🔴 直播</span>' : ''}
        ${d.prediction ? `<span class="tag tag-pred">📊 推荐：${d.prediction}</span>` : ''}
        <span class="tag tag-default">亚盘</span>
        <span class="tag tag-default">欧赔</span>
      </div>

      <button class="open-pred-btn" onclick="openModal('${id}','${safeHome} vs ${safeAway}')">
        💬 球迷观点 <span class="pred-count" id="pcount-${id}"></span>
      </button>
    </div>
  </div>`;
}

/* ── 加载比赛 ── */
let _allMatches = [];

async function loadMatches(){
  const list = document.getElementById('matchList');
  try {
    const snap = await getDocs(query(collection(db,'matches'), orderBy('createdAt','desc')));
    if(snap.empty){
      list.innerHTML = `<div class="state-box">
        <div class="state-icon">📭</div>
        <div class="state-text">暂无比赛数据<br>管理员在后台添加后显示</div>
      </div>`;
      return;
    }
    _allMatches = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderList(_allMatches);
    _allMatches.forEach(m => loadPredCount(m.id));
  } catch(e){
    console.error(e);
    list.innerHTML = `<div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-text">加载失败，请检查网络或 Firebase 配置</div>
    </div>`;
  }
}

function renderList(matches){
  const list = document.getElementById('matchList');
  if(!matches.length){
    list.innerHTML = `<div class="state-box"><div class="state-icon">🔍</div><div class="state-text">该联赛暂无赛事</div></div>`;
    return;
  }
  list.innerHTML = matches.map(m => renderCard(m.id, m)).join('');
}

/* ── 联赛筛选 ── */
window.filterLeague = (el, league) => {
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  const filtered = league === 'all' ? _allMatches : _allMatches.filter(m => m.league === league);
  renderList(filtered);
  filtered.forEach(m => loadPredCount(m.id));
};

/* ── 观点数量 ── */
async function loadPredCount(matchId){
  try {
    const snap = await getDocs(query(collection(db,'predictions'), where('matchId','==',matchId)));
    const el   = document.getElementById(`pcount-${matchId}`);
    if(el) el.textContent = snap.size ? `${snap.size} 条` : '';
  } catch(e){}
}

/* ── 弹窗状态 ── */
let _curMatchId   = '';
let _curMatchName = '';
let _curVote      = '';

window.openModal = async (matchId, matchName) => {
  _curMatchId   = matchId;
  _curMatchName = matchName;
  document.getElementById('modal-match-name').textContent = matchName;
  document.getElementById('modal-content').value          = '';
  document.getElementById('modal-username').value         = '';
  document.getElementById('char-count').textContent       = '0 / 200';
  document.getElementById('modal-toast').style.display    = 'none';
  document.querySelectorAll('.mvote').forEach(v => v.classList.remove('on'));
  _curVote = '';
  document.getElementById('modal-bd').classList.add('open');
  await loadPredList(matchId);
};

window.closeModal = e => {
  if(e && e.target !== document.getElementById('modal-bd')) return;
  document.getElementById('modal-bd').classList.remove('open');
};

window.selectVote = (el, vote) => {
  document.querySelectorAll('.mvote').forEach(v => v.classList.remove('on'));
  el.classList.add('on');
  _curVote = vote;
};

document.getElementById('modal-content').addEventListener('input', function(){
  document.getElementById('char-count').textContent = `${this.value.length} / 200`;
});

/* ── 加载观点列表 ── */
async function loadPredList(matchId){
  const container = document.getElementById('modal-pred-list');
  container.innerHTML = '<div class="pred-loading">加载中...</div>';
  try {
    const snap = await getDocs(
      query(collection(db,'predictions'),
        where('matchId','==',matchId),
        orderBy('likes','desc'),
        limit(10))
    );
    if(snap.empty){
      container.innerHTML = '<div class="pred-empty">还没有人发表看法，来第一个！</div>';
      return;
    }
    const voteClass = v => v==='主胜'?'vtag-w':v==='客胜'?'vtag-l':'vtag-d';
    container.innerHTML = snap.docs.map(d => {
      const p = d.data();
      return `
      <div class="pred-item">
        <div class="pred-av">${(p.username||'匿').slice(0,1)}</div>
        <div class="pred-right">
          <div class="pred-author-row">
            ${p.username||'匿名用户'}
            ${p.vote ? `<span class="pred-vtag ${voteClass(p.vote)}">${p.vote}</span>` : ''}
          </div>
          <div class="pred-content">${p.content}</div>
          <div class="pred-meta-row">
            <span class="pred-time">${fmtTime(p.createdAt)}</span>
            <span class="like-btn" id="lb-${d.id}" onclick="likePred('${d.id}','${matchId}')">
              👍 ${p.likes||0}
            </span>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e){
    container.innerHTML = '<div class="pred-empty">加载失败</div>';
    console.error(e);
  }
}

/* ── 点赞 ── */
window.likePred = async (predId, matchId) => {
  const btn = document.getElementById(`lb-${predId}`);
  if(!btn || btn.classList.contains('liked')) return;
  btn.classList.add('liked');
  try {
    await updateDoc(doc(db,'predictions',predId), { likes: increment(1) });
    loadPredList(matchId);
  } catch(e){ console.error(e); }
};

/* ── 发布观点 ── */
window.submitPred = async () => {
  const content  = document.getElementById('modal-content').value.trim();
  const username = document.getElementById('modal-username').value.trim() || '匿名用户';
  const btn      = document.getElementById('modal-submit');
  if(!content){ alert('请输入你的看法'); return; }
  btn.disabled    = true;
  btn.textContent = '发布中...';
  try {
    await addDoc(collection(db,'predictions'), {
      matchId:   _curMatchId,
      matchName: _curMatchName,
      username,
      content,
      vote:      _curVote,
      likes:     0,
      createdAt: serverTimestamp()
    });
    const toast = document.getElementById('modal-toast');
    toast.style.display = 'block';
    document.getElementById('modal-content').value  = '';
    document.getElementById('modal-username').value = '';
    document.querySelectorAll('.mvote').forEach(v => v.classList.remove('on'));
    _curVote = '';
    document.getElementById('char-count').textContent = '0 / 200';
    setTimeout(() => {
      toast.style.display = 'none';
      loadPredList(_curMatchId);
      loadPredCount(_curMatchId);
    }, 1200);
  } catch(e){
    alert('发布失败，请重试');
    console.error(e);
  }
  btn.disabled    = false;
  btn.textContent = '发布';
};

/* ── 启动 ── */
loadMatches();
</script>
</body>
</html>
