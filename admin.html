<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台 - 球震</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#111}

/* ── 登录页 ── */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111}
.login-box{background:#fff;padding:36px 32px;border-radius:10px;width:320px}
.login-box h2{margin-bottom:20px;font-size:20px}
.login-box input{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;
  margin-bottom:12px;font-size:14px;outline:none;display:block}
.login-box input:focus{border-color:#111}
.login-box button{width:100%;padding:11px;background:#111;color:#fff;border:none;
  border-radius:5px;font-size:14px;cursor:pointer;font-weight:600}
.login-box button:hover{background:#333}
.login-err{color:red;font-size:12px;margin-top:8px;min-height:16px}

/* ── 主布局 ── */
#app{display:none}
.topbar{background:#111;color:#fff;padding:0 20px;height:50px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:20px}
.topbar h1{font-size:16px;font-weight:700;white-space:nowrap}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:6px 14px;border-radius:5px;font-size:13px;cursor:pointer;
  color:rgba(255,255,255,.55);transition:all .15s;user-select:none;white-space:nowrap}
.ntab:hover{color:#fff;background:rgba(255,255,255,.1)}
.ntab.on{color:#fff;background:rgba(255,255,255,.18)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.status-text{font-size:12px;color:rgba(255,255,255,.45);white-space:nowrap}
.logout-btn{font-size:12px;color:rgba(255,255,255,.45);cursor:pointer;padding:4px 10px;
  border:1px solid rgba(255,255,255,.2);border-radius:4px;background:none;white-space:nowrap}
.logout-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}

/* ── 主内容 ── */
.content{max-width:1000px;margin:24px auto;padding:0 16px}
.page{display:none}.page.on{display:block}

/* ── 统计栏 ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px}
.stat-label{font-size:11px;font-weight:700;color:#888;margin-bottom:8px;letter-spacing:.3px}
.stat-num{font-size:26px;font-weight:700;color:#111}
.stat-sub{font-size:11px;color:#999;margin-top:4px}

/* ── Box / Table ── */
.box{background:#fff;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:20px}
.box-head{padding:14px 16px;border-bottom:1px solid #eee;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.box-head h3{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 14px;font-size:12px;font-weight:700;color:#666;
  background:#fafafa;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}

/* ── 按钮 ── */
button{cursor:pointer;font-family:Arial,sans-serif}
.btn{padding:7px 14px;border-radius:5px;font-size:12px;font-weight:700;border:none;
  transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-black{background:#111;color:#fff}.btn-black:hover{background:#333}
.btn-red{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5}.btn-red:hover{background:#fca5a5}
.btn-gray{background:#f0f0f0;color:#555;border:1px solid #ddd}.btn-gray:hover{background:#e0e0e0}
.btn-sm{padding:5px 10px;font-size:11px}

/* ── 表单 ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field label{font-size:12px;font-weight:700;color:#555}
.form-field input,.form-field select,.form-field textarea{
  padding:8px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;
  outline:none;font-family:Arial,sans-serif;transition:border-color .15s;width:100%}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:#111}
.form-divider{grid-column:span 2;font-size:11px;font-weight:700;color:#888;
  letter-spacing:.5px;padding-top:10px;border-top:1px solid #eee;margin-top:4px}

/* ── 弹窗 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:10px;width:620px;max-width:95vw;
  max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid #eee;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:15px;font-weight:700}
.modal-close{font-size:20px;cursor:pointer;color:#999;background:none;border:none;line-height:1}
.modal-close:hover{color:#111}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid #eee;display:flex;
  justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:#fff}

/* ── 徽章 ── */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.badge-live{background:#fee2e2;color:#dc2626}
.badge-soon{background:#ede9fe;color:#7c3aed}
.badge-done{background:#f0f0f0;color:#666}

/* ── 观点卡片 ── */
.pred-card{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.pred-card:last-child{border-bottom:none}
.pred-av{width:30px;height:30px;border-radius:50%;background:#ede9fe;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  color:#7c3aed;flex-shrink:0}
.pred-body{flex:1;min-width:0}
.pred-name{font-size:13px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pred-vote-tag{font-size:10px;background:#ede9fe;color:#7c3aed;padding:1px 6px;border-radius:3px;font-weight:700}
.pred-match-tag{font-size:10px;background:#f0f0f0;color:#666;padding:1px 6px;border-radius:3px}
.pred-text{font-size:12px;color:#555;line-height:1.6;margin-bottom:4px}
.pred-meta{font-size:11px;color:#aaa;display:flex;gap:12px}

/* ── 公告项 ── */
.notice-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #f0f0f0}
.notice-item:last-child{border-bottom:none}
.notice-order{font-size:11px;color:#aaa;min-width:24px;text-align:center;font-weight:700}
.notice-text-el{flex:1;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.notice-actions{display:flex;gap:6px;flex-shrink:0}

/* ── Toast ── */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:#fff;border:1px solid #ddd;border-radius:7px;padding:11px 16px;
  font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:8px;
  pointer-events:all;animation:fadeIn .2s ease;min-width:180px}
.toast.ok{border-left:3px solid #22c55e}
.toast.err{border-left:3px solid #dc2626}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}

/* ── 空/加载状态 ── */
.empty{text-align:center;padding:36px;color:#aaa;font-size:13px}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-box">
    <h2>⚽ 球震后台</h2>
    <input type="password" id="pw" placeholder="管理员密码"
           onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登录</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">

  <div class="topbar">
    <div class="topbar-left">
      <h1>⚽ 球震后台</h1>
      <div class="nav-tabs">
        <div class="ntab on" onclick="switchTab('matches',this)">比赛</div>
        <div class="ntab" onclick="switchTab('odds',this)">赔率</div>
        <div class="ntab" onclick="switchTab('notices',this)">公告</div>
        <div class="ntab" onclick="switchTab('predictions',this)">观点审核</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-dot"></div>
      <span class="status-text">Firebase 已连接</span>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="content">

    <!-- 比赛管理 -->
    <div class="page on" id="tab-matches">
      <div class="stats-row">
        <div class="stat-card"><div class="stat-label">总赛事</div><div class="stat-num" id="s-total">—</div><div class="stat-sub">场</div></div>
        <div class="stat-card"><div class="stat-label">直播中</div><div class="stat-num" id="s-live">—</div><div class="stat-sub">进行中</div></div>
        <div class="stat-card"><div class="stat-label">未开赛</div><div class="stat-num" id="s-soon">—</div><div class="stat-sub">待开赛</div></div>
        <div class="stat-card"><div class="stat-label">已完场</div><div class="stat-num" id="s-done">—</div><div class="stat-sub">已结束</div></div>
      </div>
      <div class="box">
        <div class="box-head">
          <h3>比赛列表</h3>
          <button class="btn btn-black" onclick="openMatchModal()">+ 添加比赛</button>
        </div>
        <table>
          <thead><tr>
            <th>联赛</th><th>主队 vs 客队</th><th>时间</th><th>比分</th>
            <th>状态</th><th>推荐</th><th>信心</th><th>操作</th>
          </tr></thead>
          <tbody id="match-tbody">
            <tr><td colspan="8" class="empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 赔率管理 -->
    <div class="page" id="tab-odds">
      <div class="box">
        <div class="box-head">
          <h3>赔率数据</h3>
          <button class="btn btn-black" onclick="openOddsModal()">+ 添加赔率</button>
        </div>
        <table>
          <thead><tr>
            <th>赛事</th><th>联赛</th><th>主胜</th><th>平局</th><th>客胜</th><th>亚盘</th><th>大/小球</th><th>操作</th>
          </tr></thead>
          <tbody id="odds-tbody">
            <tr><td colspan="8" class="empty">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 公告管理 -->
    <div class="page" id="tab-notices">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="box">
          <div class="box-head">
            <h3>公告列表</h3>
            <button class="btn btn-black" onclick="openNoticeModal()">+ 新增公告</button>
          </div>
          <div id="notice-list"><div class="empty">暂无公告</div></div>
        </div>
        <div class="box">
          <div class="box-head"><h3>前台预览效果</h3></div>
          <div style="padding:16px">
            <div style="background:#EEEDFE;border:1px solid #CECBF6;border-radius:6px;
              padding:9px 14px;display:flex;align-items:center;gap:10px">
              <span style="background:#534AB7;color:#EEEDFE;padding:2px 8px;border-radius:4px;
                font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0">公告</span>
              <span style="flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
                font-size:12px;color:#3C3489" id="notice-preview">暂无公告内容</span>
              <span style="color:#7F77DD;font-size:11px;white-space:nowrap;flex-shrink:0">查看全部 ›</span>
            </div>
            <p style="font-size:11px;color:#999;margin-top:10px">↑ 这是公告栏在前台的真实显示效果</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 观点审核 -->
    <div class="page" id="tab-predictions">
      <div class="box">
        <div class="box-head">
          <h3>球迷观点审核</h3>
          <div style="display:flex;align-items:center;gap:8px">
            <select id="pred-filter" onchange="loadPredictions()"
              style="padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none">
              <option value="">全部赛事</option>
            </select>
            <span style="font-size:12px;color:#999" id="pred-count-label"></span>
          </div>
        </div>
        <div id="pred-list"><div class="empty">暂无观点</div></div>
      </div>
    </div>

  </div>
</div>

<!-- Toast 容器 -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- 比赛弹窗 -->
<div class="modal-overlay" id="modal-match" onclick="closeModal('modal-match',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="match-modal-title">添加比赛</h3>
      <button class="modal-close" onclick="closeModal('modal-match')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field">
          <label>联赛</label>
          <input id="m-league" placeholder="如：英超、意甲、中超">
        </div>
        <div class="form-field">
          <label>轮次</label>
          <input id="m-round" placeholder="如：第30轮">
        </div>
        <div class="form-field">
          <label>主队</label>
          <input id="m-home" placeholder="主队名称">
        </div>
        <div class="form-field">
          <label>客队</label>
          <input id="m-away" placeholder="客队名称">
        </div>
        <div class="form-field">
          <label>比赛时间</label>
          <input id="m-time" placeholder="如：19:00 或 04:00">
        </div>
        <div class="form-field">
          <label>状态</label>
          <select id="m-status">
            <option value="未开赛">未开赛</option>
            <option value="直播中">直播中</option>
            <option value="完场">完场</option>
          </select>
        </div>
        <div class="form-field">
          <label>比分（直播/完场填写）</label>
          <input id="m-score" placeholder="如：1-0（未开赛留空）">
        </div>
        <div class="form-field">
          <label>直播分钟数</label>
          <input id="m-minute" type="number" placeholder="如：64（直播时填）">
        </div>
        <div class="form-field">
          <label>主队颜色</label>
          <input type="color" id="m-hc" value="#e24b4a" style="height:38px;cursor:pointer">
        </div>
        <div class="form-field">
          <label>客队颜色</label>
          <input type="color" id="m-ac" value="#3b82f6" style="height:38px;cursor:pointer">
        </div>
        <div class="form-field">
          <label>主队近况（W D L 空格分隔）</label>
          <input id="m-hf" placeholder="如：W W D L W">
        </div>
        <div class="form-field">
          <label>客队近况（W D L 空格分隔）</label>
          <input id="m-af" placeholder="如：W D W L W">
        </div>

        <div class="form-divider">📊 AI 预测（选填，填了才在前台显示）</div>

        <div class="form-field">
          <label>推荐方向</label>
          <select id="m-prediction">
            <option value="">不填写</option>
            <option value="主胜">主胜</option>
            <option value="平局">平局</option>
            <option value="客胜">客胜</option>
          </select>
        </div>
        <div class="form-field">
          <label>AI 信心指数（0–100）</label>
          <input id="m-confidence" type="number" min="0" max="100" placeholder="如：75">
        </div>
        <div class="form-field">
          <label>主胜概率 %</label>
          <input id="m-winPct" type="number" min="0" max="100" placeholder="如：45">
        </div>
        <div class="form-field">
          <label>平局概率 %（客胜自动算）</label>
          <input id="m-drawPct" type="number" min="0" max="100" placeholder="如：28">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-match')">取消</button>
      <button class="btn btn-black" onclick="saveMatch()">✓ 保存</button>
    </div>
  </div>
</div>

<!-- 赔率弹窗 -->
<div class="modal-overlay" id="modal-odds" onclick="closeModal('modal-odds',event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="odds-modal-title">添加赔率</h3>
      <button class="modal-close" onclick="closeModal('modal-odds')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-field"><label>主队</label><input id="o-home" placeholder="主队名称"></div>
        <div class="form-field"><label>客队</label><input id="o-away" placeholder="客队名称"></div>
        <div class="form-field"><label>联赛</label><input id="o-league" placeholder="如：英超"></div>
        <div class="form-field"><label>时间/状态</label><input id="o-time" placeholder="如：04:00 或 直播中"></div>
        <div class="form-field"><label>主胜赔率</label><input id="o-win" type="number" step="0.01" placeholder="如：1.95"></div>
        <div class="form-field"><label>平局赔率</label><input id="o-draw" type="number" step="0.01" placeholder="如：3.40"></div>
        <div class="form-field"><label>客胜赔率</label><input id="o-lose" type="number" step="0.01" placeholder="如：3.80"></div>
        <div class="form-field"><label>亚盘</label><input id="o-asian" placeholder="如：平手、主让半"></div>
        <div class="form-field"><label>大小球</label><input id="o-ou" placeholder="如：2.5球"></div>
        <div class="form-field">
          <label>主胜走势</label>
          <select id="o-wchg">
            <option value="flat">— 无变化</option>
            <option value="up">↑ 上涨</option>
            <option value="dn">↓ 下降</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-odds')">取消</button>
      <button class="btn btn-black" onclick="saveOdds()">✓ 保存</button>
    </div>
  </div>
</div>

<!-- 公告弹窗 -->
<div class="modal-overlay" id="modal-notice" onclick="closeModal('modal-notice',event)">
  <div class="modal-box" style="width:480px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="notice-modal-title">新增公告</h3>
      <button class="modal-close" onclick="closeModal('modal-notice')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid" style="grid-template-columns:1fr">
        <div class="form-field">
          <label>公告内容</label>
          <input id="n-text" placeholder="输入公告文字，多条用 ｜ 分隔">
        </div>
        <div class="form-field">
          <label>排序（数字越小越靠前）</label>
          <input id="n-order" type="number" value="0">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeModal('modal-notice')">取消</button>
      <button class="btn btn-black" onclick="saveNotice()">✓ 发布</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, doc,
         updateDoc, deleteDoc, query, orderBy, where,
         limit, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBjkd93pW2Kuv5mUFKdTSSZx3wH130cHrk",
  authDomain:        "qiuzhen.firebaseapp.com",
  projectId:         "qiuzhen",
  storageBucket:     "qiuzhen.firebasestorage.app",
  messagingSenderId: "347369779829",
  appId:             "1:347369779829:web:8aff1183be87895b1cfe3c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const g   = id => document.getElementById(id).value;
const set = (id, v) => { const el = document.getElementById(id); if(el) el.value = v ?? ''; };

function fmtTs(ts){
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ════ 比赛 ════ */
let _matches = [];

async function loadMatches(){
  const snap = await getDocs(query(collection(db,'matches'), orderBy('createdAt','desc')));
  _matches = snap.docs.map(d => ({id:d.id,...d.data()}));

  document.getElementById('s-total').textContent = _matches.length;
  document.getElementById('s-live').textContent  = _matches.filter(m=>m.status==='直播中').length;
  document.getElementById('s-soon').textContent  = _matches.filter(m=>m.status==='未开赛').length;
  document.getElementById('s-done').textContent  = _matches.filter(m=>m.status==='完场').length;

  // 同步观点筛选下拉
  const sel = document.getElementById('pred-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部赛事</option>' +
    _matches.map(m=>`<option value="${m.id}">${m.home} vs ${m.away}</option>`).join('');
  if(cur) sel.value = cur;

  const tbody = document.getElementById('match-tbody');
  if(!_matches.length){
    tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无比赛，点右上角添加</td></tr>';
    return;
  }
  const bc = s => s==='直播中'?'badge-live':s==='未开赛'?'badge-soon':'badge-done';
  tbody.innerHTML = _matches.map(m=>`
    <tr>
      <td><b>${m.league||'—'}</b></td>
      <td>${m.home||'—'} <span style="color:#bbb">vs</span> ${m.away||'—'}</td>
      <td style="color:#666">${m.time||'—'}</td>
      <td style="font-weight:700;color:#6366f1">${m.score||'—'}</td>
      <td><span class="badge ${bc(m.status)}">${m.status||'—'}</span></td>
      <td>${m.prediction?`<b style="color:#16a34a">${m.prediction}</b>`:'<span style="color:#ccc">—</span>'}</td>
      <td>${m.confidence?`<b>${m.confidence}%</b>`:'<span style="color:#ccc">—</span>'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-gray btn-sm" onclick="editMatch('${m.id}')">编辑</button>
          <button class="btn btn-red btn-sm" onclick="deleteMatch('${m.id}','${(m.home||'').replace(/'/g,"\\'")} vs ${(m.away||'').replace(/'/g,"\\'")}')">删除</button>
        </div>
      </td>
    </tr>`).join('');
}

window.editMatch = id => {
  const m = _matches.find(r=>r.id===id);
  if(!m) return;
  window._editMatchId = id;
  document.getElementById('match-modal-title').textContent = '编辑比赛';
  set('m-league',m.league);  set('m-round',m.round);
  set('m-home',m.home);      set('m-away',m.away);
  set('m-time',m.time);      set('m-score',m.score);
  set('m-minute',m.minute);
  set('m-hf',(m.hf||[]).join(' '));
  set('m-af',(m.af||[]).join(' '));
  set('m-prediction',m.prediction);
  set('m-confidence',m.confidence);
  set('m-winPct',m.winPct);
  set('m-drawPct',m.drawPct);
  document.getElementById('m-status').value = m.status||'未开赛';
  document.getElementById('m-hc').value = m.hc||'#e24b4a';
  document.getElementById('m-ac').value = m.ac||'#3b82f6';
  openModal('modal-match');
};

window.deleteMatch = async (id, name) => {
  if(!confirm(`确定删除「${name}」吗？`)) return;
  await deleteDoc(doc(db,'matches',id));
  toast('已删除','ok'); loadMatches();
};

window.saveMatch = async () => {
  const data = {
    league:     g('m-league').trim(),
    round:      g('m-round').trim(),
    home:       g('m-home').trim(),
    away:       g('m-away').trim(),
    time:       g('m-time').trim(),
    status:     g('m-status'),
    score:      g('m-score').trim(),
    minute:     g('m-minute').trim(),
    hc:         g('m-hc'),
    ac:         g('m-ac'),
    hf:         g('m-hf').toUpperCase().split(/\s+/).filter(Boolean),
    af:         g('m-af').toUpperCase().split(/\s+/).filter(Boolean),
    prediction: g('m-prediction').trim(),
    confidence: parseInt(g('m-confidence'))||0,
    winPct:     parseInt(g('m-winPct'))||0,
    drawPct:    parseInt(g('m-drawPct'))||0,
  };
  if(!data.home||!data.away||!data.league){ toast('请填写联赛、主队、客队','err'); return; }
  if(window._editMatchId){
    await updateDoc(doc(db,'matches',window._editMatchId), data);
    toast('已更新','ok');
  } else {
    await addDoc(collection(db,'matches'), {...data, createdAt:serverTimestamp()});
    toast('已添加','ok');
  }
  closeModal('modal-match'); loadMatches();
};

/* ════ 赔率 ════ */
let _odds = [];

async function loadOdds(){
  const snap = await getDocs(query(collection(db,'odds'), orderBy('createdAt','desc')));
  _odds = snap.docs.map(d => ({id:d.id,...d.data()}));
  const tbody = document.getElementById('odds-tbody');
  if(!_odds.length){ tbody.innerHTML='<tr><td colspan="8" class="empty">暂无赔率</td></tr>'; return; }
  const chg = c => c==='up'?'↑':c==='dn'?'↓':'—';
  tbody.innerHTML = _odds.map(o=>`
    <tr>
      <td><b>${o.home||'—'} vs ${o.away||'—'}</b></td>
      <td style="color:#666">${o.league||'—'}</td>
      <td><b style="color:#6366f1">${o.win||'—'}</b> <span style="color:#aaa;font-size:11px">${chg(o.wchg)}</span></td>
      <td>${o.draw||'—'}</td>
      <td>${o.lose||'—'}</td>
      <td style="color:#666">${o.asian||'—'}</td>
      <td style="color:#666">${o.ou||'—'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-gray btn-sm" onclick="editOdds('${o.id}')">编辑</button>
          <button class="btn btn-red btn-sm" onclick="deleteOdds('${o.id}')">删除</button>
        </div>
      </td>
    </tr>`).join('');
}

window.editOdds = id => {
  const o = _odds.find(r=>r.id===id);
  if(!o) return;
  window._editOddsId = id;
  document.getElementById('odds-modal-title').textContent = '编辑赔率';
  ['home','away','league','time','win','draw','lose','asian','ou'].forEach(k=>set('o-'+k, o[k]));
  document.getElementById('o-wchg').value = o.wchg||'flat';
  openModal('modal-odds');
};

window.deleteOdds = async id => {
  if(!confirm('确定删除这条赔率吗？')) return;
  await deleteDoc(doc(db,'odds',id));
  toast('已删除','ok'); loadOdds();
};

window.saveOdds = async () => {
  const data = {
    home:g('o-home').trim(), away:g('o-away').trim(),
    league:g('o-league').trim(), time:g('o-time').trim(),
    win:g('o-win'), draw:g('o-draw'), lose:g('o-lose'),
    asian:g('o-asian').trim(), ou:g('o-ou').trim(),
    wchg:g('o-wchg'), dchg:'flat', lchg:'flat',
  };
  if(!data.home||!data.away){ toast('请填写主队和客队','err'); return; }
  if(window._editOddsId){
    await updateDoc(doc(db,'odds',window._editOddsId), data);
    toast('已更新','ok');
  } else {
    await addDoc(collection(db,'odds'), {...data, createdAt:serverTimestamp()});
    toast('已添加','ok');
  }
  closeModal('modal-odds'); loadOdds();
};

/* ════ 公告 ════ */
let _notices = [];

async function loadNotices(){
  const snap = await getDocs(query(collection(db,'notices'), orderBy('order','asc')));
  _notices = snap.docs.map(d => ({id:d.id,...d.data()}));
  document.getElementById('notice-preview').textContent =
    _notices.length ? _notices.map(n=>n.text).join('　｜　') : '暂无公告内容';
  const container = document.getElementById('notice-list');
  if(!_notices.length){ container.innerHTML='<div class="empty">暂无公告</div>'; return; }
  container.innerHTML = _notices.map(n=>`
    <div class="notice-item">
      <span class="notice-order">#${n.order||0}</span>
      <span class="notice-text-el">${n.text}</span>
      <div class="notice-actions">
        <button class="btn btn-gray btn-sm" onclick="editNotice('${n.id}')">编辑</button>
        <button class="btn btn-red btn-sm" onclick="deleteNotice('${n.id}')">删除</button>
      </div>
    </div>`).join('');
}

window.editNotice = id => {
  const n = _notices.find(r=>r.id===id);
  if(!n) return;
  window._editNoticeId = id;
  document.getElementById('notice-modal-title').textContent = '编辑公告';
  set('n-text', n.text); set('n-order', n.order);
  openModal('modal-notice');
};

window.deleteNotice = async id => {
  if(!confirm('确定删除这条公告吗？')) return;
  await deleteDoc(doc(db,'notices',id));
  toast('已删除','ok'); loadNotices();
};

window.saveNotice = async () => {
  const text  = g('n-text').trim();
  const order = parseInt(g('n-order'))||0;
  if(!text){ toast('请填写公告内容','err'); return; }
  if(window._editNoticeId){
    await updateDoc(doc(db,'notices',window._editNoticeId), {text,order});
    toast('已更新','ok');
  } else {
    await addDoc(collection(db,'notices'), {text, order, createdAt:serverTimestamp()});
    toast('已发布','ok');
  }
  closeModal('modal-notice'); loadNotices();
};

/* ════ 观点审核 ════ */
async function loadPredictions(){
  const matchId = document.getElementById('pred-filter').value;
  const q = matchId
    ? query(collection(db,'predictions'), where('matchId','==',matchId), orderBy('createdAt','desc'), limit(50))
    : query(collection(db,'predictions'), orderBy('createdAt','desc'), limit(50));
  const snap = await getDocs(q);
  const preds = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('pred-count-label').textContent = `共 ${preds.length} 条`;
  const container = document.getElementById('pred-list');
  if(!preds.length){ container.innerHTML='<div class="empty">暂无观点</div>'; return; }
  container.innerHTML = preds.map(p=>`
    <div class="pred-card">
      <div class="pred-av">${(p.username||'匿').slice(0,1)}</div>
      <div class="pred-body">
        <div class="pred-name">
          ${p.username||'匿名用户'}
          ${p.vote?`<span class="pred-vote-tag">${p.vote}</span>`:''}
          ${p.matchName?`<span class="pred-match-tag">${p.matchName}</span>`:''}
        </div>
        <div class="pred-text">${p.content}</div>
        <div class="pred-meta">
          <span>👍 ${p.likes||0}</span>
          <span>${fmtTs(p.createdAt)}</span>
        </div>
      </div>
      <div style="flex-shrink:0">
        <button class="btn btn-red btn-sm" onclick="deletePred('${p.id}')">删除</button>
      </div>
    </div>`).join('');
}

window.deletePred = async id => {
  if(!confirm('确定删除这条观点？不可恢复。')) return;
  await deleteDoc(doc(db,'predictions',id));
  toast('已删除','ok'); loadPredictions();
};

window.loadPredictions = loadPredictions;
window._loadAll = () => { loadMatches(); loadOdds(); loadNotices(); loadPredictions(); };
</script>

<script>
/* ── 密码 ── */
const ADMIN_PW = 'qiuzhen2026'; // ← 改成你自己的密码

function login(){
  if(document.getElementById('pw').value === ADMIN_PW){
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    window._loadAll && window._loadAll();
  } else {
    document.getElementById('login-err').textContent = '密码错误，请重试';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
function logout(){
  if(!confirm('确定退出后台吗？')) return;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pw').value = '';
}

function switchTab(name, el){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
}

function openModal(id){
  document.getElementById(id).classList.add('open');
}
function closeModal(id, e){
  if(e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
  window._editMatchId  = null;
  window._editOddsId   = null;
  window._editNoticeId = null;
}

window.openMatchModal = () => {
  window._editMatchId = null;
  document.getElementById('match-modal-title').textContent = '添加比赛';
  ['m-league','m-round','m-home','m-away','m-time','m-score','m-minute',
   'm-hf','m-af','m-confidence','m-winPct','m-drawPct'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('m-status').value     = '未开赛';
  document.getElementById('m-prediction').value = '';
  document.getElementById('m-hc').value = '#e24b4a';
  document.getElementById('m-ac').value = '#3b82f6';
  openModal('modal-match');
};
window.openOddsModal = () => {
  window._editOddsId = null;
  document.getElementById('odds-modal-title').textContent = '添加赔率';
  ['o-home','o-away','o-league','o-time','o-win','o-draw','o-lose','o-asian','o-ou'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('o-wchg').value = 'flat';
  openModal('modal-odds');
};
window.openNoticeModal = () => {
  window._editNoticeId = null;
  document.getElementById('notice-modal-title').textContent = '新增公告';
  document.getElementById('n-text').value  = '';
  document.getElementById('n-order').value = '0';
  openModal('modal-notice');
};

function toast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = (type==='ok'?'✓ ':'✕ ') + msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 2800);
}
window.toast      = toast;
window.closeModal = closeModal;
window.switchTab  = switchTab;
window.login      = login;
window.logout     = logout;
</script>
